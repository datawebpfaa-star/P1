<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Undangan Invictos Premium</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif}
body{
  background: radial-gradient(circle at top,#1a1a1a,#000);
  color:white;
  overflow:hidden;
}

/* Opening */
.opening{
  position:fixed;
  width:100%;height:100vh;
  display:flex;flex-direction:column;
  justify-content:center;align-items:center;
  background:linear-gradient(135deg,#000,#111);
  z-index:10;
  text-align:center;
}

.opening h1{
  font-size:2.8rem;
  color:gold;
  text-shadow:0 0 25px gold;
}

.opening p{margin:15px 0;opacity:.8}

.btn{
  padding:14px 28px;
  background:linear-gradient(45deg,gold,#ffd700);
  border:none;
  border-radius:30px;
  font-weight:bold;
  cursor:pointer;
  box-shadow:0 0 20px gold;
}

/* Main */
.main{
  display:none;
  height:100vh;
  overflow:auto;
  padding:20px;
  text-align:center;
}

.show{animation:openAnim 1.2s ease forwards}

@keyframes openAnim{
  from{opacity:0;transform:scale(.8) translateY(80px)}
  to{opacity:1;transform:scale(1) translateY(0)}
}

/* Card Poster */
.card{
  max-width:420px;
  margin:auto;
  padding:25px;
  border-radius:20px;
  background:linear-gradient(145deg,#111,#1c1c1c);
  box-shadow:0 0 40px rgba(255,215,0,.3);
  position:relative;
}

/* Logo pojok */
.logo{
  position:absolute;
  top:-15px;
  right:-15px;
  width:80px;
}

h2{
  font-size:2.2rem;
  letter-spacing:2px;
}

.gold{color:gold;text-shadow:0 0 15px gold}

.subtitle{font-style:italic;color:gold;margin:10px 0}

.date{
  margin:15px 0;
  font-size:1.2rem;
}

.circle{
  display:inline-block;
  padding:10px 18px;
  border-radius:50%;
  border:2px solid gold;
  color:gold;
  margin:0 10px;
}

.info{margin-top:15px;opacity:.9}

/* Button bawah */
.actions{margin-top:20px}

.actions a{
  display:block;
  margin:10px auto;
  padding:12px;
  width:80%;
  border-radius:30px;
  background:linear-gradient(45deg,gold,#ffcc00);
  color:black;
  text-decoration:none;
  font-weight:bold;
  box-shadow:0 0 15px gold;
}

</style>
</head>
<body>

<!-- Opening -->
<div class="opening" id="open">
  <h1>ALUMNI & UMUM DIUNDANG</h1>
  <p>Employee Farewell Party Invictos<br>Untuk Alumni & Umum</p>
  <button class="btn" onclick="buka()">Buka Undangan</button>
</div>

<!-- Main -->
<div class="main" id="main">
  <div class="card">

    <img src="https://dull-ivory-rpyvkobvzz.edgeone.app/smk.jpg" class="logo">

    <p style="opacity:.6">YOU ARE INVITED TO</p>

    <h2>EMPLOYEE</h2>
    <h2>FAREWELL</h2>

    <div class="subtitle">Party</div>

    <h3 class="gold">INVICTOS</h3>

    <div class="date">
      KAMIS <span class="circle">30</span> APRIL 2026
    </div>

    <p>TO:</p>
    <p>ALUMNI SMKN 1 ENAM LINGKUNG & UMUM</p>

    <div class="info">
      📍 SMKN 1 ENAM LINGKUNG<br>
      ⏰ 10.00 - 18.00 WIB
    </div>

    <div class="actions">
      <a href="https://share.google/sFpRhoeeWguSSePwk" target="_blank">📍 Buka Lokasi</a>
      <a href="#" onclick="alert('10.00 - 18.00 WIB')">⏰ Lihat Waktu</a>
    </div>

  </div>
</div>

<script>
function buka(){
  document.getElementById('open').style.display='none';
  let main=document.getElementById('main');
  main.style.display='block';
  main.classList.add('show');
  document.body.style.overflow='auto';
}
</script>

</body>
</html>
