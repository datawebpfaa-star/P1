<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Employee Farewell Party - Invictos</title>
  <style>
    * {margin:0; padding:0; box-sizing:border-box; font-family: 'Segoe UI', sans-serif;}

    body {
      background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.9)), url('bg.jpg');
      background-size: cover;
      background-position: center;
      color: white;
      overflow-x: hidden;
    }

    /* Opening Screen */
    .opening {
      position: fixed;
      width: 100%;
      height: 100vh;
      background: linear-gradient(135deg, #1c1c1c, #000);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      z-index: 999;
      animation: fadeOut 2s ease 3s forwards;
    }

    .opening h1 {
      font-size: 2.5rem;
      letter-spacing: 3px;
      color: gold;
      animation: zoomIn 1.5s ease;
    }

    @keyframes zoomIn {
      from {transform: scale(0); opacity: 0;}
      to {transform: scale(1); opacity: 1;}
    }

    @keyframes fadeOut {
      to {opacity: 0; visibility: hidden;}
    }

    /* Main Content */
    .container {
      text-align: center;
      padding: 30px;
      animation: fadeIn 2s ease;
    }

    @keyframes fadeIn {
      from {opacity:0; transform: translateY(30px);} 
      to {opacity:1; transform: translateY(0);} 
    }

    .card {
      max-width: 400px;
      margin: auto;
      background: linear-gradient(135deg, rgba(255,215,0,0.08), rgba(255,255,255,0.03));
      border-radius: 20px;
      padding: 20px;
      backdrop-filter: blur(15px);
      box-shadow: 0 0 25px rgba(255,215,0,0.3);
      border: 1px solid rgba(255,215,0,0.2);
    }

    .card img {
      width: 100%;
      border-radius: 15px;
      margin-bottom: 20px;
    }

    h2 {
      font-size: 2rem;
      color: gold;
      margin-bottom: 10px;
    }

    .date {
      font-size: 1.2rem;
      margin: 10px 0;
    }

    .info {
      margin-top: 20px;
    }

    .btn {
      display: inline-block;
      margin: 10px;
      padding: 12px 20px;
      border-radius: 30px;
      background: gold;
      color: black;
      text-decoration: none;
      font-weight: bold;
      transition: 0.3s;
    }

    .btn:hover {
      background: #fff;
      transform: scale(1.1);
    }

    footer {
      margin-top: 20px;
      font-size: 0.8rem;
      opacity: 0.6;
    }
  </style>
</head>
<body>

  <!-- Opening Animation -->
  <div class="opening">
    <h1>INVITATION</h1>
    <p>Loading Event...</p>
  </div>

  <!-- Main Content -->
  <div class="container">
    <div class="card">
      <!-- Logo SMK -->
      <img src="logo-smk.png" alt="Logo SMK" style="width:80px; margin-bottom:10px;">

      <!-- Background emblem (blur effect) -->
      <img src="logo-bg.png" alt="Background Logo" style="position:absolute; width:300px; opacity:0.08; top:50%; left:50%; transform:translate(-50%,-50%); z-index:0;">
      <img src="https://ibb.co.com/jvK1W9K8" alt="Undangan">

      <h2>Employee Farewell Party</h2>
      <p>Invictos</p>

      <div class="date">
        Kamis, 30 April 2026
      </div>

      <p>Untuk:<br>Alumni SMKN 1 Enam Lingkung & Umum</p>

      <div class="info">
        <p>⏰ 10.00 - 18.00 WIB</p>
        <p>📍 SMKN 1 Enam Lingkung</p>
      </div>

      <!-- Buttons -->
      <a href="https://share.google/sFpRhoeeWguSSePwk" class="btn" target="_blank">📍 Lokasi</a>

      <a href="#" class="btn" onclick="alert('Acara dimulai pukul 10.00 WIB sampai 18.00 WIB')">⏰ Lihat Waktu</a>

      <footer>
        Created by Faa
      </footer>
    </div>
  </div>

</body>
</html>
